<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <title>Registeration Form</title>
    <style>
        .registration-form {
            background-color: #90a1ef;
            padding: 20px;
            margin: 40px auto;
            max-width: 450px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight:200;
            font-style: normal;
            font-display: auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 6px;
        }
        .submit-btn {
            width: 100%;
            background-color: #171593; 
            color: white;
            padding: 12px 20px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;}

        .submit-btn:hover {
            background-color: #fafafe;
            color:black;
            transform: translateY(-2px);  
        }
        .submit-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="registration-form">
        <h1>Registration Form</h1>
        <form>
            <div class="form-group">
                <label>First Name</label>
                <input type="text" placeholder="First name">
            </div>

            <div class="form-group">
                <label>Last name</label>
                <input type="text" placeholder="Last name">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="text" placeholder="Email">
            </div>

            <div class="form-group">
                <label>Phone no.</label>
                <input type="text" placeholder="Enter your phone no.">
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select id="gender">
                    <option value="" disabled selected ">Select your gender option</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Others">Others</option>
                </select>
            </div>

            <div class="form-group">
                <label>DOB</label>
                <input type="date" id="dob">
            </div>

            <div class="form-group">
                <label>Courses</label>
                <select id="courses">
                    <option value="" disabled selected>Select courses</option>
                    <option value="B.Tech">B.Tech</option>
                    <option value="CA">CA</option>
                    <option value="BCA">BCA</option>
                    <option value="B.com hons.">B.com hons.</option>
                    <option value="M.tech">M.tech</option>
                    <option value="MS">MS</option>
                </select>
            </div>
            <div>
              <label for="profile-pic">Upload your photo:</label><br>
              <input type="file" id="profile-pic" name="profile_picture" accept="image/* required">
              </div><br>
               <div>
              <label for="profile-pic">Upload signature:</label><br>
              <input type="file" id="signature" name="signature" accept="image/* required">
              </div><br>


            <div class="form-group">
                <label>Choose skills</label><p>
                <label><input type="checkbox" name="skills" value="html"> HTML5</label><br>
                <label><input type="checkbox" name="skills" value="javascript"> JS</label><br>
                <label><input type="checkbox" name="skills" value="c++"> C++</label><br>
                <label><input type="checkbox" name="skills" value="python"> Python</label><br>
                <label><input type="checkbox" name="skills" value="c"> <span class="skill-name">C</span></p></label>
            </div>

            <div class="form-group">
                <label>About yourself</label>
                <textarea id="about-me" name="aboutMe" placeholder="Tell us something about you" rows="5"></textarea>
            </div>
            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </div> 
</body>
</html>
